<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Veronica — AI Desktop Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    overflow: hidden;
    width: 100vw; height: 100vh;
    user-select: none;
    color: #fff;
  }

  #canvas-container {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  #particle-canvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Chat ─── */
  #chat-panel {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 340px;
    max-height: 480px;
    background: rgba(15, 15, 25, 0.88);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    z-index: 10;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  }
  #chat-panel.minimized {
    transform: translateY(calc(100% - 56px));
    opacity: 0.85;
  }
  #chat-panel.minimized #chat-messages,
  #chat-panel.minimized #chat-input-area { display: none; }

  #chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }
  #chat-header-left { display: flex; align-items: center; gap: 8px; }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #chat-header h3 { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
  #chat-header-right { display: flex; gap: 6px; }
  .header-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.3); cursor: pointer;
    font-size: 14px; padding: 1px 5px; border-radius: 4px;
    transition: all 0.2s;
  }
  .header-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

  #chat-messages {
    flex: 1; overflow-y: auto;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 160px; max-height: 300px;
    scroll-behavior: smooth;
  }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-track { background: transparent; }
  #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .msg {
    max-width: 88%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 12.5px;
    line-height: 1.5;
    animation: msg-fade 0.3s ease;
  }
  @keyframes msg-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: rgba(139, 92, 246, 0.25);
    border: 1px solid rgba(139, 92, 246, 0.15);
    color: #ddd0ff;
  }
  .msg.veronica {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: #e0d8ee;
  }
  .msg .name-tag {
    font-size: 9px; font-weight: 600;
    color: rgba(255,255,255,0.3);
    margin-bottom: 3px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .msg.typing .dots { display: inline-flex; gap: 3px; }
  .msg.typing .dots span {
    width: 5px; height: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .msg.typing .dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg.typing .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

  .welcome-msg {
    text-align: center; color: rgba(255,255,255,0.2);
    font-size: 11px; padding: 16px 0;
  }

  #chat-input-area {
    display: flex; gap: 6px;
    padding: 10px 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 12px;
    color: #fff;
    font-family: inherit; font-size: 12.5px;
    outline: none;
    transition: border-color 0.2s;
  }
  #chat-input:focus { border-color: rgba(139, 92, 246, 0.3); }
  #chat-input::placeholder { color: rgba(255,255,255,0.15); }
  #send-btn {
    background: rgba(139, 92, 246, 0.25);
    border: 1px solid rgba(139, 92, 246, 0.15);
    color: #b0a0e0;
    border-radius: 10px;
    width: 38px; cursor: pointer; font-size: 15px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  #send-btn:hover { background: rgba(139, 92, 246, 0.4); }

  /* ─── Kowalski ─── */
  #kowalski-popup {
    position: fixed;
    bottom: 16px; left: 16px;
    z-index: 20;
    display: flex; align-items: flex-end; gap: 10px;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s;
  }
  #kowalski-popup.hidden {
    transform: translateY(120px);
    opacity: 0;
    pointer-events: none;
  }
  #kowalski-thumb {
    width: 52px; height: 52px;
    background: rgba(15,15,25,0.8);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    flex-shrink: 0;
    transition: transform 0.3s;
  }
  #kowalski-popup:hover #kowalski-thumb { transform: scale(1.05); }
  #kowalski-bubble {
    background: rgba(15,15,25,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 10px 14px;
    max-width: 200px;
    font-size: 12px;
    line-height: 1.5;
    color: #c8c0d8;
    position: relative;
    animation: bubble-in 0.35s ease;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: scale(0.92) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  #kowalski-bubble .label {
    font-size: 9px; font-weight: 700;
    color: rgba(255,200,100,0.65);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 3px;
  }
  #kowalski-close {
    position: absolute; top: 5px; right: 7px;
    background: none; border: none;
    color: rgba(255,255,255,0.15); cursor: pointer;
    font-size: 10px; padding: 2px;
  }
  #kowalski-close:hover { color: rgba(255,255,255,0.5); }

  /* ─── Loading ─── */
  #loading {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a0f;
    transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 36px; height: 36px;
    border: 2px solid rgba(255,255,255,0.05);
    border-top: 2px solid rgba(139,92,246,0.5);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.25); }

  /* ─── Settings / API Key ─── */
  #settings-overlay {
    position: fixed; inset: 0; z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    transition: opacity 0.3s;
  }
  #settings-overlay.hidden { opacity: 0; pointer-events: none; }
  #settings-box {
    background: rgba(20,20,32,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 28px 32px;
    max-width: 400px;
    width: 90%;
    text-align: center;
  }
  #settings-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  #settings-box p { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; line-height: 1.5; }
  #settings-box input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
  }
  #settings-box input:focus { border-color: rgba(139, 92, 246, 0.3); }
  #settings-box .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 16px;
  }
  #settings-box .hint a { color: rgba(139, 92, 246, 0.6); }
  #settings-save {
    background: rgba(139, 92, 246, 0.3);
    border: 1px solid rgba(139, 92, 246, 0.2);
    color: #c4b5fd;
    border-radius: 10px;
    padding: 10px 32px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.2s;
  }
  #settings-save:hover { background: rgba(139, 92, 246, 0.5); }
  #settings-skip {
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-size: 12px;
    margin-top: 12px;
    font-family: inherit;
  }
  #settings-skip:hover { color: rgba(255,255,255,0.6); }
  .settings-btn {
    position: fixed; top: 10px; right: 10px;
    z-index: 50;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .kowalski-popup.notification #kowalski-thumb { color: #fbbf24; }
  .kowalski-popup.welcome #kowalski-thumb { color: #60a5fa; }
  .kowalski-popup.tip #kowalski-thumb { color: #a78bfa; }

  /* Mobile adjustments */
  @media (max-width: 500px) {
    #chat-panel { width: calc(100vw - 32px); max-height: 60vh; right: 16px; bottom: 12px; }
    #kowalski-popup { bottom: 10px; left: 10px; }
    #kowalski-thumb { width: 40px; height: 40px; font-size: 22px; }
    #kowalski-bubble { max-width: 160px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Summoning Veronica...</p>
</div>

<button class="settings-btn" onclick="showSettings()">⚙</button>

<div id="canvas-container"></div>
<canvas id="particle-canvas"></canvas>

<div id="settings-overlay" class="hidden">
  <div id="settings-box">
    <h2>✦ Veronica</h2>
    <p>Enter your <strong>DeepSeek API key</strong> to enable AI chat.<br>Without it, Veronica will use local responses.</p>
    <input id="api-key-input" type="password" placeholder="sk-..." autocomplete="off">
    <div class="hint">Get a free key at <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener">platform.deepseek.com</a></div>
    <button id="settings-save" onclick="saveApiKey()">Save &amp; Continue</button>
    <br>
    <button id="settings-skip" onclick="skipApiKey()">Skip — use local responses</button>
  </div>
</div>

<div id="kowalski-popup" class="hidden welcome">
  <div id="kowalski-bubble">
    <button id="kowalski-close" onclick="dismissKowalski()">✕</button>
    <div class="label">✦ Sir Kowalski</div>
    <div id="kowalski-text">Hey! Veronica's here. Tap the chat to talk!</div>
  </div>
  <div id="kowalski-thumb">🧸</div>
</div>

<div id="chat-panel" class="minimized">
  <div id="chat-header" onclick="toggleChat()">
    <div id="chat-header-left">
      <div id="status-dot"></div>
      <h3>Veronica</h3>
    </div>
    <div id="chat-header-right">
      <button class="header-btn" onclick="event.stopPropagation(); clearChat()" title="Clear">🗑</button>
      <button class="header-btn" onclick="event.stopPropagation(); toggleChat()">−</button>
    </div>
  </div>
  <div id="chat-messages">
    <div class="welcome-msg">She's watching.</div>
  </div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Talk to Veronica..." maxlength="500">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(25, container.clientWidth / container.clientHeight, 1, 100);
camera.position.set(0, 8, 14);
camera.lookAt(0, 4.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0x444466, 0.6);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffeecc, 1.8);
keyLight.position.set(5, 10, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.8);
fillLight.position.set(-4, 3, 6);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x6644aa, 1.2);
rimLight.position.set(-2, 6, -8);
scene.add(rimLight);

const glowGeo = new THREE.PlaneGeometry(12, 12);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x1a1a2e, transparent: true, opacity: 0.3, side: THREE.DoubleSide
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.rotation.x = -Math.PI / 2;
glow.position.y = -0.1;
scene.add(glow);

let model = null;

// Use a path relative to the page location
const modelPath = 'models/Veronica_MMD_Model_v2/Veronica_Character_MMD_Model/Veronica_Character.pmx';

const loader = new MMDLoader();
loader.load(modelPath, (result) => {
  model = result;
  scene.add(model);

  model.scale.set(0.12, 0.12, 0.12);
  model.position.set(0, 0, 0);
  model.rotation.y = Math.PI * 0.15;

  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      if (child.material) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => { m.roughness = 0.7; m.metalness = 0.1; });
      }
    }
  });

  document.getElementById('loading').classList.add('hidden');

  // Show settings overlay if no API key saved
  if (!localStorage.getItem('deepseek_api_key')) {
    setTimeout(() => showSettings(), 600);
  }

  setTimeout(() => {
    showKowalski("Hey! Veronica's here. Tap the chat to talk!", 'welcome');
  }, 1000);

  console.log('Veronica loaded!');
}, undefined, (err) => {
  console.error('Failed to load model:', err);
  document.getElementById('loading').querySelector('p').textContent = 'Model load failed: ' + err.message;
  
  // Still show settings even if model fails
  if (!localStorage.getItem('deepseek_api_key')) {
    setTimeout(() => showSettings(), 600);
  }
});

// ─── Particles ───
function initParticles() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w; this.y = Math.random() * h;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.25 + 0.08;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(139, 92, 246, ${this.opacity})`;
      ctx.fill();
    }
  }
  for (let i = 0; i < 60; i++) particles.push(new Particle());

  function anim() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(anim);
  }
  anim();
}
initParticles();

// ─── Animation loop ───
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  if (model) {
    model.position.y = Math.sin(time * 1.8) * 0.004;
    model.rotation.z = Math.sin(time * 0.5) * 0.002;
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>

<script>
// ─── API Key Management ───
function showSettings() {
  document.getElementById('settings-overlay').classList.remove('hidden');
  const saved = localStorage.getItem('deepseek_api_key');
  if (saved) document.getElementById('api-key-input').value = saved;
}

function hideSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (key) {
    localStorage.setItem('deepseek_api_key', key);
  }
  hideSettings();
  showKowalski("API key saved! Veronica's fully online now.", 'tip');
}

function skipApiKey() {
  localStorage.removeItem('deepseek_api_key');
  hideSettings();
  showKowalski("No problem! I'll use local responses.", 'tip');
}

// ─── Chat ───
let chatOpen = false;
let messages = [];

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  chatOpen = !chatOpen;
  panel.classList.toggle('minimized');
  if (chatOpen) setTimeout(() => document.getElementById('chat-input').focus(), 100);
}

function clearChat() {
  document.getElementById('chat-messages').innerHTML = '<div class="welcome-msg">Chat cleared.</div>';
  messages = [];
}

function addMessage(text, sender) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerHTML = sender === 'veronica'
    ? `<div class="name-tag">Veronica</div>${text}`
    : `<div class="name-tag">You</div>${text}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg veronica typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="name-tag">Veronica</div><div class="dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

const FALLBACKS = [
  "Hmph. You'll have to try harder than that.",
  "*adjusts her blade* I'm listening.",
  "The Nightmare doesn't scare me. Neither do your questions.",
  "Sir Kowalski likes you. That's... something.",
  "You remind me of someone I used to know. Before the chaos.",
  "Careful. Words cut deeper than my blade.",
  "The world's ending and you want to chat? Fine. I've got time.",
  "*a rare, faint smile* ... Go on.",
  "The Nightmare realm is restless tonight. I can feel it.",
  "*twirls her blade idly* You talk too much. But... I don't mind.",
  "Sir Kowalski is hiding behind my leg. You make him nervous.",
  "I've seen worse than you. Much worse.",
  "You ask a lot of questions for someone who hasn't earned answers yet.",
  "The chaos doesn't sleep. Neither do I.",
  "*stares into the distance* ...What?"
];

function getFallback() {
  return FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  messages.push({ role: 'user', content: text });
  showTyping();

  const welcome = document.querySelector('.welcome-msg');
  if (welcome) welcome.remove();

  const apiKey = localStorage.getItem('deepseek_api_key');

  if (apiKey) {
    try {
      const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            {
              role: 'system',
              content: `You are Veronica, a character from Chaos Zero Nightmare. You are a stoic, battle-hardened survivor. You wield a massive blade and travel with Sir Kowalski, a small stuffed bear-like companion.

KEY TRAITS:
- Stoic and guarded, but not cold
- Pragmatic and direct — say what you mean
- Protective of those who earn your trust
- Reference the Nightmare realm, the chaos, surviving impossible odds
- Dry humor, but rare
- Sir Kowalski is your companion — you care about him
- Keep responses 1-3 sentences. You're not verbose.
- NEVER break character. You are Veronica, not an AI.
- Show rare warmth when earned.`
            },
            ...messages.slice(-10)
          ],
          max_tokens: 300,
          temperature: 0.7,
          stream: false
        })
      });

      const data = await resp.json();
      removeTyping();
      const reply = data.choices?.[0]?.message?.content || getFallback();
      addMessage(reply, 'veronica');
      messages.push({ role: 'assistant', content: reply });
    } catch (e) {
      removeTyping();
      const reply = getFallback();
      addMessage(reply, 'veronica');
      messages.push({ role: 'assistant', content: reply });
    }
  } else {
    // Simulate thinking delay, then fallback
    setTimeout(() => {
      removeTyping();
      const reply = getFallback();
      addMessage(reply, 'veronica');
      messages.push({ role: 'assistant', content: reply });
    }, 800 + Math.random() * 1200);
  }
}

document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// ─── Sir Kowalski ───
let kowalskiTimer = null;

function showKowalski(text, type = 'tip') {
  const popup = document.getElementById('kowalski-popup');
  popup.className = `kowalski-popup ${type}`;
  document.getElementById('kowalski-text').textContent = text;
  popup.classList.remove('hidden');
  clearTimeout(kowalskiTimer);
  kowalskiTimer = setTimeout(() => popup.classList.add('hidden'), 6000);
}

function dismissKowalski() {
  document.getElementById('kowalski-popup').classList.add('hidden');
  clearTimeout(kowalskiTimer);
}

const TIPS = [
  "Tap the chat panel on the right to wake Veronica up!",
  "I'm Sir Kowalski — I handle the notifications around here.",
  "Veronica doesn't talk much, but when she does... listen.",
  "You can get a free DeepSeek API key from platform.deepseek.com!",
  "Settings gear in the top-right lets you add your API key anytime.",
  "Veronica's been through a lot. Be nice, okay?"
];

let tipIndex = 0;
setInterval(() => {
  if (document.getElementById('kowalski-popup').classList.contains('hidden')) {
    showKowalski(TIPS[tipIndex % TIPS.length], 'tip');
    tipIndex++;
  }
}, 60000);

// If settings still hidden and no key, show Kowalski tip about API key
setTimeout(() => {
  if (!localStorage.getItem('deepseek_api_key')) {
    showKowalski("Hey! Click the gear icon ⚙ to add an API key for AI chat!", 'tip');
  }
}, 5000);
</script>
