<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Veronica — AI Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    overflow: hidden;
    width: 100%; height: 100%;
    position: fixed;
    user-select: none;
    -webkit-user-select: none;
    color: #fff;
  }

  #canvas-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #particle-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }

  /* ─── Chat Bubble Button ─── */
  #chat-bubble {
    position: fixed;
    bottom: 28px; right: 20px;
    z-index: 15;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(139, 92, 246, 0.25);
    border: 1px solid rgba(139, 92, 246, 0.2);
    display: flex;
    align-items: center; justify-content: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #chat-bubble:active { transform: scale(0.9); }
  #chat-bubble .badge {
    position: absolute;
    top: -2px; right: -2px;
    width: 14px; height: 14px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid #0a0a0f;
    animation: pulse-dot 2s infinite;
  }

  /* ─── Chat Panel (Full Screen on Mobile) ─── */
  #chat-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: rgba(10, 10, 15, 0.92);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 75vh;
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    box-shadow: 0 -8px 48px rgba(0,0,0,0.6);
  }
  #chat-panel.open { transform: translateY(0); }

  #chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  #chat-header-left { display: flex; align-items: center; gap: 10px; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #chat-header h3 { font-size: 16px; font-weight: 600; }
  .header-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 16px;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .header-btn:active { background: rgba(255,255,255,0.12); }

  #chat-messages {
    flex: 1; overflow-y: auto;
    padding: 8px 20px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 100px; max-height: 50vh;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  #chat-messages::-webkit-scrollbar { width: 2px; }
  #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    animation: msg-fade 0.25s ease;
  }
  @keyframes msg-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: rgba(139, 92, 246, 0.25);
    border: 1px solid rgba(139, 92, 246, 0.12);
    color: #ddd0ff;
  }
  .msg.veronica {
    align-self: flex-start;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: #e0d8ee;
  }
  .msg .name-tag {
    font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.3);
    margin-bottom: 3px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .msg.typing .dots { display: inline-flex; gap: 3px; }
  .msg.typing .dots span {
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .msg.typing .dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg.typing .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

  .welcome-msg {
    text-align: center; color: rgba(255,255,255,0.15);
    font-size: 12px; padding: 20px 0;
  }

  #chat-input-area {
    display: flex; gap: 8px;
    padding: 8px 20px 24px;
    border-top: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: inherit; font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #chat-input:focus { border-color: rgba(139, 92, 246, 0.3); }
  #chat-input::placeholder { color: rgba(255,255,255,0.2); }
  #send-btn {
    background: rgba(139, 92, 246, 0.25);
    border: 1px solid rgba(139, 92, 246, 0.15);
    color: #b0a0e0;
    border-radius: 12px;
    width: 48px; cursor: pointer; font-size: 18px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn:active { background: rgba(139, 92, 246, 0.4); }

  /* ─── Settings Overlay ─── */
  #settings-overlay {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    transition: opacity 0.3s;
    padding: 20px;
  }
  #settings-overlay.hidden { opacity: 0; pointer-events: none; }
  #settings-box {
    background: rgba(20,20,32,0.96);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px 24px;
    max-width: 360px; width: 100%;
    text-align: center;
  }
  #settings-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  #settings-box p { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; line-height: 1.6; }
  #settings-box input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: inherit; font-size: 14px;
    outline: none;
    margin-bottom: 8px;
    -webkit-appearance: none;
  }
  #settings-box input:focus { border-color: rgba(139, 92, 246, 0.3); }
  #settings-box .hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 16px; }
  #settings-box .hint a { color: rgba(139, 92, 246, 0.6); }
  #settings-save {
    background: rgba(139, 92, 246, 0.3);
    border: 1px solid rgba(139, 92, 246, 0.2);
    color: #c4b5fd;
    border-radius: 12px;
    padding: 12px 32px;
    cursor: pointer;
    font-size: 14px; font-family: inherit; font-weight: 500;
    transition: all 0.2s;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  #settings-save:active { background: rgba(139, 92, 246, 0.5); }
  #settings-skip {
    background: none; border: none;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-size: 13px;
    margin-top: 14px;
    font-family: inherit;
  }
  #settings-skip:active { color: rgba(255,255,255,0.6); }

  .settings-btn {
    position: fixed; top: 12px; right: 12px;
    z-index: 12;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.3);
    border-radius: 10px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 16px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
  }
  .settings-btn:active { background: rgba(255,255,255,0.1); color: #fff; }

  /* ─── Loading ─── */
  #loading {
    position: fixed; inset: 0; z-index: 50;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a0f;
    transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,0.04);
    border-top: 2px solid rgba(139,92,246,0.4);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { margin-top: 14px; font-size: 13px; color: rgba(255,255,255,0.2); }

  /* ─── Kowalski ─── */
  #kowalski-popup {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    -webkit-tap-highlight-color: transparent;
  }
  #kowalski-popup.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(30px);
    pointer-events: none;
  }
  #kowalski-bubble {
    background: rgba(15,15,25,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 12px 16px;
    max-width: 260px;
    font-size: 13px;
    line-height: 1.5;
    color: #c8c0d8;
    position: relative;
    animation: bubble-in 0.35s ease;
    text-align: center;
  }
  @keyframes bubble-in {
    from { opacity: 0; transform: scale(0.92) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  #kowalski-bubble .label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,200,100,0.65);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  #kowalski-thumb {
    font-size: 40px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    transition: transform 0.3s;
  }
  #kowalski-popup:active #kowalski-thumb { transform: scale(0.9); }

  .kowalski-popup.notification #kowalski-thumb { filter: drop-shadow(0 4px 12px rgba(251,191,36,0.3)); }
  .kowalski-popup.welcome #kowalski-thumb { filter: drop-shadow(0 4px 12px rgba(96,165,250,0.3)); }
  .kowalski-popup.tip #kowalski-thumb { filter: drop-shadow(0 4px 12px rgba(167,139,250,0.3)); }

  /* ─── Desktop overrides ─── */
  @media (min-width: 768px) {
    #chat-panel {
      bottom: 24px; left: auto; right: 24px;
      width: 360px;
      max-height: 520px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      transform: translateY(calc(100% - 56px));
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    #chat-panel.open { transform: translateY(0); }
    #chat-header { padding: 14px 18px; }
    #chat-messages { max-height: 300px; }
    #chat-input-area { padding: 8px 18px 16px; }
    #chat-bubble { display: none; }
    #chat-panel.minimized { transform: translateY(calc(100% - 56px)); }
    #chat-panel.minimized #chat-messages,
    #chat-panel.minimized #chat-input-area { display: none; }
    #kowalski-popup { bottom: 24px; left: 24px; transform: none; flex-direction: row; }
    #kowalski-popup.hidden { opacity: 0; transform: translateY(120px); pointer-events: none; }
    #kowalski-popup:active #kowalski-thumb { transform: none; }
    #kowalski-popup:hover #kowalski-thumb { transform: scale(1.05); }
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Summoning Veronica...</p>
</div>

<button class="settings-btn" onclick="showSettings()">⚙</button>

<div id="canvas-container"></div>
<canvas id="particle-canvas"></canvas>

<div id="settings-overlay" class="hidden">
  <div id="settings-box">
    <h2>✦ Veronica</h2>
    <p>Enter your DeepSeek API key to enable AI chat.<br>Without it, Veronica uses local responses.</p>
    <input id="api-key-input" type="password" placeholder="sk-..." autocomplete="off">
    <div class="hint">Get a free key at <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener">platform.deepseek.com</a></div>
    <button id="settings-save" onclick="saveApiKey()">Save &amp; Continue</button>
    <br>
    <button id="settings-skip" onclick="skipApiKey()">Skip — local only</button>
  </div>
</div>

<div id="kowalski-popup" class="hidden welcome">
  <div id="kowalski-bubble">
    <div class="label">✦ Sir Kowalski</div>
    <div id="kowalski-text">Tap the purple button to talk to Veronica!</div>
  </div>
  <div id="kowalski-thumb">🧸</div>
</div>

<button id="chat-bubble" onclick="toggleChat()" style="display:none;">
  <span class="badge"></span>
  💬
</button>

<div id="chat-panel">
  <div id="chat-header" onclick="toggleChat()">
    <div id="chat-header-left">
      <div id="status-dot"></div>
      <h3>Veronica</h3>
    </div>
    <button class="header-btn" onclick="event.stopPropagation(); clearChat()">🗑</button>
  </div>
  <div id="chat-messages">
    <div class="welcome-msg">She's watching...</div>
  </div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Talk to Veronica..." maxlength="500" enterkeyhint="send">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

const container = document.getElementById('canvas-container');
const isMobile = window.innerWidth < 768;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);

// Camera: tighter on mobile, wider on desktop
const camera = new THREE.PerspectiveCamera(isMobile ? 30 : 25, container.clientWidth / container.clientHeight, 1, 100);
if (isMobile) {
  camera.position.set(0, 7, 12);
  camera.lookAt(0, 4, 0);
} else {
  camera.position.set(0, 8, 14);
  camera.lookAt(0, 4.5, 0);
}

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
renderer.outputColorSpace = 'srgb';
container.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x444466, 0.6);
scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffeecc, 1.8);
keyLight.position.set(5, 10, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = isMobile ? 512 : 1024;
keyLight.shadow.mapSize.height = isMobile ? 512 : 1024;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.8);
fillLight.position.set(-4, 3, 6);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0x6644aa, 1.2);
rimLight.position.set(-2, 6, -8);
scene.add(rimLight);

const glowGeo = new THREE.PlaneGeometry(12, 12);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x1a1a2e, transparent: true, opacity: 0.3, side: THREE.DoubleSide
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.rotation.x = -Math.PI / 2;
glow.position.y = -0.1;
scene.add(glow);

let model = null;
const modelPath = 'models/Veronica_MMD_Model_v2/Veronica_Character_MMD_Model/Veronica_Character.pmx';

const loader = new MMDLoader();
loader.load(modelPath, (result) => {
  model = result;
  scene.add(model);

  const s = isMobile ? 0.1 : 0.12;
  model.scale.set(s, s, s);
  model.position.set(0, isMobile ? -0.5 : 0, 0);
  model.rotation.y = Math.PI * 0.15;

  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      if (child.material) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => {
          // Preserve MMD's original texture colors — don't override them
          // Standard MMD look: slightly glossy, not metallic
          m.roughness = 0.3;
          m.metalness = 0.0;
          // MMD models use vertex colors and toon shading — keep original colors
          m.color.multiplyScalar(1.0);
          // Ensure textures render with proper gamma/sRGB
          if (m.map) {
            m.map.colorSpace = 'srgb';
            m.map.anisotropy = renderer.capabilities.getMaxAnisotropy();
          }
          // Ambient occlusion support from MMD
          if (m.aoMap) {
            m.aoMap.colorSpace = 'srgb';
          }
        });
      }
    }
  });

  document.getElementById('loading').classList.add('hidden');

  // Show chat bubble on mobile
  if (isMobile) {
    document.getElementById('chat-bubble').style.display = 'flex';
  }

  // Settings if no API key
  if (!localStorage.getItem('deepseek_api_key')) {
    setTimeout(() => showSettings(), 600);
  }

  // Kowalski welcome
  setTimeout(() => {
    showKowalski(isMobile ? "Tap the button to talk!" : "Click the chat to talk!", 'welcome');
  }, 1000);
}, undefined, (err) => {
  console.error('Failed to load model:', err);
  document.getElementById('loading').querySelector('p').textContent = 'Model load failed';
  if (!localStorage.getItem('deepseek_api_key')) {
    setTimeout(() => showSettings(), 600);
  }
});

// Particles
function initParticles() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w; this.y = Math.random() * h;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.2 + 0.05;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(139, 92, 246, ${this.opacity})`;
      ctx.fill();
    }
  }
  for (let i = 0; i < (isMobile ? 30 : 60); i++) particles.push(new Particle());

  function anim() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(anim);
  }
  anim();
}
initParticles();

// Animation loop
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  if (model) {
    model.position.y = Math.sin(time * 1.8) * 0.004;
    model.rotation.z = Math.sin(time * 0.5) * 0.002;
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>

<script>
// ─── Settings ───
function showSettings() {
  document.getElementById('settings-overlay').classList.remove('hidden');
  const saved = localStorage.getItem('deepseek_api_key');
  if (saved) document.getElementById('api-key-input').value = saved;
}

function hideSettings() {
  document.getElementById('settings-overlay').classList.add('hidden');
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (key) localStorage.setItem('deepseek_api_key', key);
  hideSettings();
  showKowalski("API key saved! Veronica's online.", 'tip');
}

function skipApiKey() {
  localStorage.removeItem('deepseek_api_key');
  hideSettings();
  showKowalski("No problem! I'll use local lines.", 'tip');
}

// ─── Chat ───
let chatOpen = false;
let messages = [];

function toggleChat() {
  const panel = document.getElementById('chat-panel');
  chatOpen = !chatOpen;
  panel.classList.toggle('open');
  if (chatOpen) {
    setTimeout(() => document.getElementById('chat-input').focus(), 300);
  }
}

function clearChat() {
  document.getElementById('chat-messages').innerHTML = '<div class="welcome-msg">Chat cleared.</div>';
  messages = [];
}

function addMessage(text, sender) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerHTML = sender === 'veronica'
    ? `<div class="name-tag">Veronica</div>${text}`
    : `<div class="name-tag">You</div>${text}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg veronica typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="name-tag">Veronica</div><div class="dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

const FALLBACKS = [
  "Hmph. You'll have to try harder than that.",
  "*adjusts her blade* I'm listening.",
  "The Nightmare doesn't scare me. Neither do your questions.",
  "Sir Kowalski likes you. That's... something.",
  "You remind me of someone I used to know. Before the chaos.",
  "Careful. Words cut deeper than my blade.",
  "The world's ending and you want to chat? Fine. I've got time.",
  "*a rare, faint smile* ... Go on.",
  "The Nightmare realm is restless tonight.",
  "*twirls her blade* You talk too much. I don't mind.",
  "I've seen worse. Much worse.",
  "You ask a lot of questions. Earn the answers.",
  "The chaos doesn't sleep. Neither do I.",
  "*stares into the distance* ...What?"
];

function getFallback() {
  return FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  messages.push({ role: 'user', content: text });
  showTyping();

  const welcome = document.querySelector('.welcome-msg');
  if (welcome) welcome.remove();

  const apiKey = localStorage.getItem('deepseek_api_key');

  if (apiKey) {
    try {
      const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            { role: 'system', content: 'You are Veronica from Chaos Zero Nightmare. Stoic, battle-hardened survivor with a massive blade. You travel with Sir Kowalski, a small stuffed bear. Direct, pragmatic, 1-3 sentence responses. Rare dry humor. Stay in character. You are NOT an AI.' },
            ...messages.slice(-10)
          ],
          max_tokens: 300,
          temperature: 0.7
        })
      });
      const data = await resp.json();
      removeTyping();
      const reply = data.choices?.[0]?.message?.content || getFallback();
      addMessage(reply, 'veronica');
      messages.push({ role: 'assistant', content: reply });
    } catch (e) {
      removeTyping();
      const reply = getFallback();
      addMessage(reply, 'veronica');
      messages.push({ role: 'assistant', content: reply });
    }
  } else {
    setTimeout(() => {
      removeTyping();
      const reply = getFallback();
      addMessage(reply, 'veronica');
      messages.push({ role: 'assistant', content: reply });
    }, 800 + Math.random() * 1200);
  }
}

document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

// ─── Kowalski ───
let kowalskiTimer = null;

function showKowalski(text, type = 'tip') {
  const popup = document.getElementById('kowalski-popup');
  popup.className = `kowalski-popup ${type}`;
  document.getElementById('kowalski-text').textContent = text;
  popup.classList.remove('hidden');
  clearTimeout(kowalskiTimer);
  kowalskiTimer = setTimeout(() => popup.classList.add('hidden'), 6000);
}

function dismissKowalski() {
  document.getElementById('kowalski-popup').classList.add('hidden');
  clearTimeout(kowalskiTimer);
}

// Auto-dismiss Kowalski on tap
document.getElementById('kowalski-popup').addEventListener('click', dismissKowalski);

const TIPS = [
  "Tap the 💬 button to chat with Veronica!",
  "I'm Sir Kowalski — I handle the notifications.",
  "Tap the gear ⚙ to add your DeepSeek API key!",
  "Veronica doesn't talk much. When she does, listen."
];

let tipIndex = 0;
setInterval(() => {
  if (document.getElementById('kowalski-popup').classList.contains('hidden')) {
    showKowalski(TIPS[tipIndex % TIPS.length], 'tip');
    tipIndex++;
  }
}, 45000);
</script>
